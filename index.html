<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neste dia no Pokémon GO</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;
  color:#e0e0e0;
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
.bg-particles{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at 20% 50%,rgba(72,52,212,0.15) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(255,95,109,0.1) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(0,198,255,0.08) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
header{
  position:relative;z-index:1;text-align:center;padding:40px 20px 20px;
}
header h1{
  font-size:2.4rem;font-weight:800;
  background:linear-gradient(135deg,#ff5f6d,#ffc371,#00c6ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  margin-bottom:6px;
}
header .subtitle{
  font-size:1.1rem;color:#aaa;font-weight:400;
}
header .date-display{
  margin-top:14px;
  display:inline-block;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:50px;padding:10px 28px;
  font-size:1.15rem;font-weight:600;color:#ffc371;
  backdrop-filter:blur(6px);
}
.date-nav{
  margin-top:18px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
}
.date-nav .nav-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:#ffc371;border-radius:50%;width:40px;height:40px;
  font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,transform 0.15s;
}
.date-nav .nav-btn:hover{background:rgba(255,195,113,0.2);transform:scale(1.1)}
.date-nav .nav-btn:active{transform:scale(0.95)}
.date-nav .today-btn{
  background:linear-gradient(135deg,#ff5f6d,#ffc371);color:#1a1a2e;
  border:none;border-radius:20px;padding:8px 18px;
  font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:700;
  cursor:pointer;transition:opacity 0.2s,transform 0.15s;
}
.date-nav .today-btn:hover{opacity:0.85;transform:scale(1.05)}
.date-nav .today-btn:active{transform:scale(0.95)}
.date-nav .date-input-wrap{
  position:relative;
}
.date-nav .date-input-wrap input[type="date"]{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:#ffc371;border-radius:12px;padding:8px 14px;
  font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:600;
  cursor:pointer;outline:none;
}
.date-nav .date-input-wrap input[type="date"]:focus{
  border-color:rgba(255,195,113,0.5);
}
.date-nav .date-input-wrap input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(0.7) sepia(1) saturate(3) hue-rotate(10deg);cursor:pointer;
}
.event-count{
  text-align:center;margin-top:8px;font-size:0.9rem;color:#888;
}
.container{
  position:relative;z-index:1;
  max-width:900px;margin:0 auto;padding:20px;
}
.year-section{
  margin-bottom:36px;
}
.year-header{
  font-size:1.6rem;font-weight:700;
  color:#ffc371;
  border-bottom:2px solid rgba(255,195,113,0.25);
  padding-bottom:8px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.year-header .year-badge{
  background:linear-gradient(135deg,#ff5f6d,#ffc371);
  color:#1a1a2e;border-radius:10px;padding:4px 14px;
  font-size:1.1rem;font-weight:800;
}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:16px 20px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:16px;
  transition:transform 0.2s,background 0.2s;
  backdrop-filter:blur(4px);
}
.card:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.09);
}
.card .dex-num{
  flex-shrink:0;
  width:52px;height:52px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,195,113,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;font-weight:700;color:#ffc371;
}
.card .info{flex:1}
.card .info .poke-name{
  font-size:1.15rem;font-weight:700;color:#fff;
}
.card .info .poke-text{
  font-size:0.95rem;color:#bbb;margin-top:4px;line-height:1.6;
}
.card .info .poke-text .status-line{
  display:block;
}
.status-tag{
  display:inline-block;
  border-radius:6px;padding:2px 8px;
  font-size:0.75rem;font-weight:700;
  margin-left:6px;vertical-align:middle;
}
.tag-estreia{background:#4caf50;color:#fff}
.tag-brilhante{background:#ffd700;color:#333}
.tag-sombroso{background:#7b1fa2;color:#fff}
.tag-sombroso-brilhante{background:linear-gradient(135deg,#7b1fa2,#ffd700);color:#fff}
.tag-dinamax{background:#e91e63;color:#fff}
.tag-dinamax-brilhante{background:linear-gradient(135deg,#e91e63,#ffd700);color:#fff}

.no-events{
  text-align:center;padding:80px 20px;
}
.no-events .pokeball{font-size:4rem;margin-bottom:16px;opacity:0.4}
.no-events h2{font-size:1.5rem;color:#ffc371;margin-bottom:10px}
.no-events p{color:#888;font-size:1.05rem}

.loading-msg{
  text-align:center;padding:60px 20px;color:#888;font-size:1.1rem;
}
.loading-msg .spinner{
  display:inline-block;width:30px;height:30px;
  border:3px solid rgba(255,255,255,0.15);
  border-top-color:#ffc371;border-radius:50%;
  animation:spin 0.8s linear infinite;margin-bottom:12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

footer{
  position:relative;z-index:1;text-align:center;
  padding:30px 20px;color:#555;font-size:0.85rem;
}
@media(max-width:600px){
  header h1{font-size:1.6rem}
  .card{flex-direction:column;text-align:center;gap:10px}
  .card .sprite-wrap{margin:0 auto}
}
</style>
</head>

const STATUS_KEYS = [
  {key:"estreia", label:"Estreia", tagClass:"tag-estreia"},
  {key:"brilhante", label:"Brilhante", tagClass:"tag-brilhante"},
  {key:"sombroso", label:"Sombroso", tagClass:"tag-sombroso"},
  {key:"sombrosoBrilhante", label:"Sombroso Brilhante", tagClass:"tag-sombroso-brilhante"},
  {key:"dinamax", label:"Dinamax", tagClass:"tag-dinamax"},
  {key:"dinamaxBrilhante", label:"Dinamax Brilhante", tagClass:"tag-dinamax-brilhante"}
];

const MONTHS_PT = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function parseDate(str){
  if(!str) return null;
  const p=str.split("/");
  if(p.length!==3) return null;
  return {day:parseInt(p[0],10), month:parseInt(p[1],10), year:parseInt(p[2],10)};
}

let currentDate=new Date();

function showDate(targetDay, targetMonth){
  document.getElementById("dateDisplay").textContent=
    targetDay+" de "+MONTHS_PT[targetMonth-1];

  const picker=document.getElementById("datePicker");
  const yy=currentDate.getFullYear();
  const mm=String(targetMonth).padStart(2,"0");
  const dd=String(targetDay).padStart(2,"0");
  picker.value=`${yy}-${mm}-${dd}`;

  // Collect all individual events for today
  const rawEvents=[];
  for(const poke of POKEMON_DATA){
    for(const st of STATUS_KEYS){
      const d=parseDate(poke[st.key]);
      if(d && d.day===targetDay && d.month===targetMonth){
        rawEvents.push({
          name:poke.name,
          dexNum:poke.n,
          year:d.year,
          status:st.label,
          key:st.key,
          tagClass:st.tagClass
        });
      }
    }
  }

  const app=document.getElementById("app");
  const countEl=document.getElementById("eventCount");

  if(rawEvents.length===0){
    countEl.textContent="";
    app.innerHTML=`
      <div class="no-events">
        <div class="pokeball">&#x1F6AB;</div>
        <h2>Nenhum lançamento neste dia!</h2>
        <p>Parece que ${targetDay} de ${MONTHS_PT[targetMonth-1]} não teve nenhum lançamento registrado no Pokémon GO.</p>
      </div>`;
    return;
  }

  countEl.textContent=rawEvents.length+" lançamento"+(rawEvents.length>1?"s":"")+" encontrado"+(rawEvents.length>1?"s":"");

  // Sort by year then dex number
  rawEvents.sort((a,b)=>a.year-b.year || a.dexNum-b.dexNum);

  // Group by year
  const byYear=new Map();
  for(const e of rawEvents){
    if(!byYear.has(e.year)) byYear.set(e.year,[]);
    byYear.get(e.year).push(e);
  }

  let html="";
  for(const [year,yearEvents] of byYear){
    html+=`<div class="year-section">
      <div class="year-header"><span class="year-badge">${year}</span></div>`;

    // Group by name within the same year (same name = same card)
    const byName=new Map();
    for(const ev of yearEvents){
      const gk=ev.name;
      if(!byName.has(gk)) byName.set(gk,[]);
      byName.get(gk).push(ev);
    }

    for(const [name,group] of byName){
      const dexNum=group[0].dexNum;

      // Build status text
      let textHtml="";
      if(group.length===1){
        const ev=group[0];
        textHtml=ev.key==="estreia"
          ? `Em ${ev.year}, <strong>${ev.name}</strong> foi lançado!`
          : `Em ${ev.year}, <strong>${ev.name}</strong> <span class="status-tag ${ev.tagClass}">${ev.status}</span> foi lançado!`;
      } else {
        const tags=group.map(ev=>`<span class="status-tag ${ev.tagClass}">${ev.status}</span>`).join(" ");
        textHtml=`Em ${year}, <strong>${name}</strong> ${tags} foi lançado!`;
      }

      html+=`<div class="card">
        <div class="dex-num">#${dexNum}</div>
        <div class="info">
          <div class="poke-name">${name}</div>
          <div class="poke-text">${textHtml}</div>
        </div>
      </div>`;
    }
    html+="</div>";
  }
  app.innerHTML=html;
}

function changeDay(offset){
  currentDate.setDate(currentDate.getDate()+offset);
  showDate(currentDate.getDate(), currentDate.getMonth()+1);
}

// Navigation buttons
document.getElementById("prevDay").addEventListener("click",()=>changeDay(-1));
document.getElementById("nextDay").addEventListener("click",()=>changeDay(1));
document.getElementById("todayBtn").addEventListener("click",()=>{
  currentDate=new Date();
  showDate(currentDate.getDate(), currentDate.getMonth()+1);
});

// Date picker input
document.getElementById("datePicker").addEventListener("change",function(){
  const parts=this.value.split("-");
  if(parts.length===3){
    currentDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    showDate(currentDate.getDate(), currentDate.getMonth()+1);
  }
});

// Keyboard navigation
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT") return;
  if(e.key==="ArrowLeft"){changeDay(-1);e.preventDefault();}
  if(e.key==="ArrowRight"){changeDay(1);e.preventDefault();}
});

// Init with today
showDate(currentDate.getDate(), currentDate.getMonth()+1);
</script>
