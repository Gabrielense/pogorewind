<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.07);--text:#e0e0e0;--text-dim:#888;
  --accent:#ffc371;--accent2:#ff5f6d;--accent3:#00c6ff;
  --shadow-purple:#7b1fa2;--dynamax-pink:#e91e63;--shiny-gold:#ffd700;
  --debut-green:#4caf50;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 50%,rgba(72,52,212,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 15%,rgba(255,95,109,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 85%,rgba(0,198,255,0.06) 0%,transparent 50%);
}

/* Header */
header{position:relative;z-index:1;text-align:center;padding:36px 20px 12px}
header .logo{font-size:2.6rem;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--accent2),var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .tagline{font-size:1rem;color:var(--text-dim);font-weight:400;margin-top:2px}
.date-display{
  margin-top:14px;display:inline-block;
  background:var(--surface);border:1px solid var(--border);
  border-radius:50px;padding:10px 26px;
  font-size:1.15rem;font-weight:700;color:var(--accent);backdrop-filter:blur(6px)}
.date-nav{margin-top:14px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.nav-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--accent);
  border-radius:50%;width:38px;height:38px;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s}
.nav-btn:hover{background:rgba(255,195,113,0.15);transform:scale(1.1)}
.nav-btn:active{transform:scale(0.95)}
.today-btn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--bg);
  border:none;border-radius:20px;padding:7px 16px;
  font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .15s}
.today-btn:hover{opacity:0.85;transform:scale(1.05)}
.date-input input[type="date"]{
  background:var(--surface);border:1px solid var(--border);color:var(--accent);
  border-radius:12px;padding:7px 12px;font-family:'Outfit',sans-serif;
  font-size:0.9rem;font-weight:600;cursor:pointer;outline:none}
.date-input input[type="date"]:focus{border-color:rgba(255,195,113,0.5)}
.date-input input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(0.7) sepia(1) saturate(3) hue-rotate(10deg);cursor:pointer}
.event-count{text-align:center;margin-top:6px;font-size:0.85rem;color:var(--text-dim)}

/* Lang toggle */
.lang-toggle{
  position:absolute;top:16px;right:20px;z-index:10;
  display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:3px}
.lang-toggle button{
  background:transparent;border:none;color:var(--text-dim);
  padding:5px 12px;border-radius:16px;font-family:'Outfit',sans-serif;
  font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.lang-toggle button.active{background:var(--accent);color:var(--bg)}

/* Container */
.container{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:16px 20px}

/* Year sections */
.year-section{margin-bottom:32px}
.year-header{
  display:flex;align-items:center;gap:10px;
  padding-bottom:8px;margin-bottom:14px;
  border-bottom:2px solid rgba(255,195,113,0.2)}
.year-badge{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:var(--bg);border-radius:10px;padding:4px 14px;
  font-size:1.1rem;font-weight:800}

/* Pokemon Cards */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:12px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  transition:transform .2s,background .2s}
.card:hover{transform:translateY(-2px);background:var(--surface-hover)}
.card .dex-num{
  flex-shrink:0;width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:2px solid rgba(255,195,113,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:0.78rem;font-weight:700;color:var(--accent)}
.card .info{flex:1;min-width:0}
.card .info .poke-name{font-size:1.05rem;font-weight:700;color:#fff}
.card .info .poke-text{font-size:0.9rem;color:#bbb;margin-top:2px;line-height:1.5}
.card .sprites-row{display:flex;gap:2px;flex-shrink:0;align-items:center}
.sprite-wrap{position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sprite-wrap img.sprite{height:64px;width:auto;max-width:107px;object-fit:contain;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
.sprite-wrap .badge-icon{position:absolute;bottom:-2px;right:-4px;width:20px;height:20px;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6))}
.status-tag{
  display:inline-block;border-radius:5px;padding:1px 7px;
  font-size:0.7rem;font-weight:700;margin-left:4px;vertical-align:middle}
.tag-estreia{background:var(--debut-green);color:#fff}
.tag-brilhante{background:var(--shiny-gold);color:#333}
.tag-sombroso{background:var(--shadow-purple);color:#fff}
.tag-sombroso-brilhante{background:linear-gradient(135deg,var(--shadow-purple),var(--shiny-gold));color:#fff}
.tag-dinamax{background:var(--dynamax-pink);color:#fff}
.tag-dinamax-brilhante{background:linear-gradient(135deg,var(--dynamax-pink),var(--shiny-gold));color:#fff}

/* Events / Milestones section */
.milestones{margin-top:10px;margin-bottom:28px}
.milestones-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  padding:10px 0;border-bottom:2px solid rgba(0,198,255,0.2)}
.milestones-header .ms-badge{
  background:linear-gradient(135deg,var(--accent3),#6dd5fa);
  color:var(--bg);border-radius:10px;padding:5px 14px;
  font-size:0.9rem;font-weight:800;white-space:nowrap}
.milestone-card{
  background:rgba(0,198,255,0.04);border:1px solid rgba(0,198,255,0.12);
  border-radius:14px;padding:12px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
  transition:transform .2s,background .2s}
.milestone-card:hover{transform:translateY(-2px);background:rgba(0,198,255,0.08)}
.milestone-card .ms-icon{
  flex-shrink:0;width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent3),#6dd5fa);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;color:var(--bg);font-weight:800;letter-spacing:-0.5px;
  overflow:hidden}
.milestone-card .ms-icon img{width:28px;height:28px;object-fit:contain}
.milestone-card .ms-info{flex:1}
.milestone-card .ms-type{font-size:0.72rem;font-weight:700;color:var(--accent3);text-transform:uppercase;letter-spacing:0.5px}
.milestone-card .ms-name{font-size:0.95rem;font-weight:600;color:#fff;margin-top:1px}
.milestone-card .ms-year{font-size:0.8rem;color:var(--text-dim);margin-top:1px}

/* Empty state */
.no-events{text-align:center;padding:70px 20px}
.no-events .empty-circle{
  width:64px;height:64px;border-radius:50%;margin:0 auto 16px;
  border:3px solid rgba(255,195,113,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:800;color:rgba(255,195,113,0.3)}
.no-events h2{font-size:1.4rem;color:var(--accent);margin-bottom:8px}
.no-events p{color:var(--text-dim);font-size:1rem}

/* Loading */
.loading-msg{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:1rem}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,0.12);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{position:relative;z-index:1;text-align:center;padding:28px 20px;color:#444;font-size:0.8rem}

@media(max-width:600px){
  header .logo{font-size:1.7rem}
  .lang-toggle{position:static;justify-content:center;margin-top:10px}
  .card{flex-wrap:wrap;gap:8px}
  .card .sprites-row{width:100%;justify-content:center}
  .milestone-card{flex-direction:column;text-align:center}
}
</style>
</head>

const SPRITE_BASE="https://raw.githubusercontent.com/Gabrielense/pogorewind/main/sprites/";
const REPO_BASE="https://raw.githubusercontent.com/Gabrielense/pogorewind/main/";
const SHADOW_ICON="https://cdn3.emoji.gg/emojis/2383-shadow-pokemon-go.png";
const DINAMAX_ICON="https://tiermaker.com/images/templates/all-gigantamax-pokmon-15141343/151413431655072068.png";

const STATUS_KEYS=[
  {key:"estreia",    labelPT:"Regular",            labelEN:"Default",        shiny:false, badge:null,        tagClass:"tag-estreia"},
  {key:"brilhante",  labelPT:"Brilhante",          labelEN:"Shiny",          shiny:true,  badge:null,        tagClass:"tag-brilhante"},
  {key:"sombroso",   labelPT:"Sombroso",            labelEN:"Shadow",         shiny:false, badge:SHADOW_ICON, tagClass:"tag-sombroso"},
  {key:"sombrosoBrilhante", labelPT:"Sombroso Brilhante", labelEN:"Shiny Shadow", shiny:true,  badge:SHADOW_ICON, tagClass:"tag-sombroso-brilhante"},
  {key:"dinamax",    labelPT:"Dinamax",             labelEN:"Dynamax",        shiny:false, badge:DINAMAX_ICON,tagClass:"tag-dinamax"},
  {key:"dinamaxBrilhante",  labelPT:"Dinamax Brilhante",  labelEN:"Shiny Dynamax",shiny:true,  badge:DINAMAX_ICON,tagClass:"tag-dinamax-brilhante"}
];

const MONTHS_PT=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const MONTHS_EN=["January","February","March","April","May","June","July","August","September","October","November","December"];

let lang="en";
let currentDate=new Date();

const i18n={
  tagline:{pt:"Reviva cada lançamento, relembre marcos do jogo.",en:"Relive every launch, remember major milestones."},
  today:{pt:"HOJE",en:"TODAY"},
  noTitle:{pt:"Nenhum lançamento neste dia!",en:"Nothing happened on this day!"},
  noText:{pt:d=>`Parece que ${d} não teve nenhum lançamento registrado no Pokémon GO.`,en:d=>`Looks like ${d} had no recorded launches in Pokémon GO.`},
  launchedSingle:{pt:"foi lançado!",en:"was released!"},
  launchedPlural:{pt:"foram lançados!",en:"were released!"},
  milestones:{pt:"Neste dia na história do Pokémon GO",en:"This day on Pokémon GO history"},
  count:{pt:(n)=>n+" lançamento"+(n>1?"s":"")+" encontrado"+(n>1?"s":""),en:(n)=>n+" release"+(n>1?"s":"")+" found"},
  inYear:{pt:"Em",en:"In"},
  and:{pt:" e ",en:" and "}
};

function T(key){return typeof i18n[key][lang]==="function"?i18n[key][lang]:i18n[key][lang]}
function TF(key,arg){const v=i18n[key][lang];return typeof v==="function"?v(arg):v}

function setLang(l){
  lang=l;
  document.getElementById("langPT").classList.toggle("active",l==="pt");
  document.getElementById("langEN").classList.toggle("active",l==="en");
  document.getElementById("tagline").textContent=T("tagline");
  document.getElementById("todayBtn").textContent=T("today");
  document.documentElement.lang=l==="pt"?"pt-BR":"en";
  showDate(currentDate.getDate(),currentDate.getMonth()+1);
}

function parseDate(str){
  if(!str)return null;
  const p=str.split("/");
  if(p.length!==3)return null;
  return{day:parseInt(p[0],10),month:parseInt(p[1],10),year:parseInt(p[2],10)};
}

function spriteUrl(id,shiny){
  return SPRITE_BASE+encodeURIComponent(id)+(shiny?"%2BS":"")+".png";
}

function stLabel(st){return lang==="pt"?st.labelPT:st.labelEN}
function pokeName(p){return lang==="pt"?p.name:p.nameEn}
function months(){return lang==="pt"?MONTHS_PT:MONTHS_EN}

function showDate(targetDay,targetMonth){
  const mo=months();
  document.getElementById("dateDisplay").textContent=
    lang==="pt"?(targetDay+" de "+mo[targetMonth-1]):(mo[targetMonth-1]+" "+targetDay);

  const picker=document.getElementById("datePicker");
  const yy=currentDate.getFullYear();
  picker.value=`${yy}-${String(targetMonth).padStart(2,"0")}-${String(targetDay).padStart(2,"0")}`;

  // ── Collect pokemon release events ──
  const rawEvents=[];
  for(const poke of POKEMON_DATA){
    for(const st of STATUS_KEYS){
      const d=parseDate(poke[st.key]);
      if(d && d.day===targetDay && d.month===targetMonth){
        rawEvents.push({
          name:pokeName(poke), id:poke.id, dexNum:poke.n,
          year:d.year, label:stLabel(st), key:st.key,
          shiny:st.shiny, badge:st.badge, tagClass:st.tagClass
        });
      }
    }
  }

  // ── Collect milestone events ──
  const dayMilestones=[];
  for(const ev of EVENTS_DATA){
    const d=parseDate(ev.date);
    if(d && d.day===targetDay && d.month===targetMonth){
      dayMilestones.push({
        type:lang==="pt"?ev.type:ev.typeEn,
        name:lang==="pt"?ev.name:ev.nameEn,
        year:d.year,
        img:ev.img
      });
    }
  }
  dayMilestones.sort((a,b)=>a.year-b.year);

  const app=document.getElementById("app");
  const countEl=document.getElementById("eventCount");
  const totalCount=rawEvents.length+dayMilestones.length;

  if(totalCount===0){
    countEl.textContent="";
    const dateStr=lang==="pt"?(targetDay+" de "+mo[targetMonth-1]):(mo[targetMonth-1]+" "+targetDay);
    app.innerHTML=`<div class="no-events">
      <div class="empty-circle">--</div>
      <h2>${T("noTitle")}</h2>
      <p>${TF("noText",dateStr)}</p>
    </div>`;
    return;
  }

  countEl.textContent=TF("count",totalCount);
  rawEvents.sort((a,b)=>a.year-b.year||a.dexNum-b.dexNum);

  // ── Milestones section ──
  let msHtml="";
  if(dayMilestones.length>0){
    msHtml+=`<div class="milestones">
      <div class="milestones-header"><span class="ms-badge">${T("milestones")}</span></div>`;
    for(const ms of dayMilestones){
      const imgUrl=REPO_BASE+encodeURIComponent(ms.img)+".png";
      msHtml+=`<div class="milestone-card">
        <div class="ms-icon"><img src="${imgUrl}" alt="${ms.type}"></div>
        <div class="ms-info">
          <div class="ms-type">${ms.type}</div>
          <div class="ms-name">${ms.name}</div>
          <div class="ms-year">${ms.year}</div>
        </div>
      </div>`;
    }
    msHtml+="</div>";
  }

  // ── Pokemon releases by year ──
  const byYear=new Map();
  for(const e of rawEvents){
    if(!byYear.has(e.year))byYear.set(e.year,[]);
    byYear.get(e.year).push(e);
  }

  let pokeHtml="";
  const inWord=T("inYear");
  for(const[year,yearEvents]of byYear){
    pokeHtml+=`<div class="year-section">
      <div class="year-header"><span class="year-badge">${year}</span></div>`;

    const byName=new Map();
    for(const ev of yearEvents){
      if(!byName.has(ev.name))byName.set(ev.name,[]);
      byName.get(ev.name).push(ev);
    }

    for(const[name,group]of byName){
      const dexNum=group[0].dexNum;
      const launched=group.length>1?T("launchedPlural"):T("launchedSingle");
      // Sprites
      let spritesHtml="";
      for(const ev of group){
        const src=spriteUrl(ev.id,ev.shiny);
        const badgeHtml=ev.badge?`<img class="badge-icon" src="${ev.badge}" alt="${ev.label}">`:"";
        spritesHtml+=`<div class="sprite-wrap">
          <img class="sprite" src="${src}" alt="${name}" loading="lazy" onerror="this.style.display='none'">
          ${badgeHtml}
        </div>`;
      }

      // Text
      let textHtml="";
      const andWord=T("and");
      if(group.length===1){
        const ev=group[0];
        textHtml=ev.key==="estreia"
          ?`${inWord} ${ev.year}, <strong>${name}</strong> ${launched}`
          :`${inWord} ${ev.year}, <strong>${name}</strong> <span class="status-tag ${ev.tagClass}">${ev.label}</span> ${launched}`;
      }else{
        const tagSpans=group.map(ev=>`<span class="status-tag ${ev.tagClass}">${ev.label}</span>`);
        let tags;
        if(tagSpans.length===2){
          tags=tagSpans[0]+andWord+tagSpans[1];
        }else{
          tags=tagSpans.slice(0,-1).join(", ")+andWord+tagSpans[tagSpans.length-1];
        }
        textHtml=`${inWord} ${year}, <strong>${name}</strong> ${tags} ${launched}`;
      }

      pokeHtml+=`<div class="card">
        <div class="dex-num">#${dexNum}</div>
        <div class="info">
          <div class="poke-name">${name}</div>
          <div class="poke-text">${textHtml}</div>
        </div>
        <div class="sprites-row">${spritesHtml}</div>
      </div>`;
    }
    pokeHtml+="</div>";
  }

  app.innerHTML=msHtml+pokeHtml;
}

function changeDay(offset){
  currentDate.setDate(currentDate.getDate()+offset);
  showDate(currentDate.getDate(),currentDate.getMonth()+1);
}

document.getElementById("prevDay").addEventListener("click",()=>changeDay(-1));
document.getElementById("nextDay").addEventListener("click",()=>changeDay(1));
document.getElementById("todayBtn").addEventListener("click",()=>{
  currentDate=new Date();
  showDate(currentDate.getDate(),currentDate.getMonth()+1);
});
document.getElementById("datePicker").addEventListener("change",function(){
  const p=this.value.split("-");
  if(p.length===3){
    currentDate=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    showDate(currentDate.getDate(),currentDate.getMonth()+1);
  }
});
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT")return;
  if(e.key==="ArrowLeft"){changeDay(-1);e.preventDefault()}
  if(e.key==="ArrowRight"){changeDay(1);e.preventDefault()}
});

// Init — detect browser language
if((navigator.language||navigator.userLanguage||"").startsWith("pt")){
  setLang("pt");
}else{
  showDate(currentDate.getDate(),currentDate.getMonth()+1);
}
</script>
</body>
